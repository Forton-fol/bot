services:
  db:
    image: postgres:16-alpine
    container_name: nri_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nri_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nri_password}
      POSTGRES_DB: ${POSTGRES_DB:-nri_club}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nri_user} -d ${POSTGRES_DB:-nri_club}"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    container_name: nri_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nri_user}:${POSTGRES_PASSWORD:-nri_password}@db:5432/${POSTGRES_DB:-nri_club}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./exports:/tmp/exports

  migrate:
    build: .
    container_name: nri_migrate
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nri_user}:${POSTGRES_PASSWORD:-nri_password}@db:5432/${POSTGRES_DB:-nri_club}
    depends_on:
      db:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    profiles:
      - migrate

volumes:
  postgres_data:
